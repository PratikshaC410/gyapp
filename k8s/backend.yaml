apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: 42719/gyan-backend:2.0
          ports:
            - containerPort: 5000
          env:
            - name: MONGO_URI
              value: "mongodb+srv://pratiksha:pratiksha410@cluster0.5ckzmu3.mongodb.net/gyan-app?retryWrites=true&w=majority"
            - name: JWT_SECRET
              value: "pratiksha"
            - name: GOOGLE_SECRET_KEY
              value: "xsvhtxxpcylrowwi"
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  selector:
    app: backend
  ports:
    - port: 5000
      targetPort: 5000
  type: ClusterIP
