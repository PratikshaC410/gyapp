services:
  backend:
    image: 42719/gyan-backend:1.0
    container_name: backend-container
    ports:
      - "5000:5000"
    env_file:
      - backend/.env
    restart: always

  frontend:
    image: 42719/gyan-frontend:1.0
    container_name: frontend-container
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always
